services:
  postgres:
    image: postgres:18-alpine
    container_name: crossfit-real-world-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crossfit_real_world
      POSTGRES_USER: crossfit
      POSTGRES_PASSWORD: crossfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossfit -d crossfit_real_world"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:4
    container_name: crossfit-real-world-localstack
    restart: unless-stopped
    environment:
      SERVICES: sqs,ses,sns
      DEFAULT_REGION: us-east-1
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:-}
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack/init-resources.sh:/etc/localstack/init/ready.d/init-resources.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  localstack_data:
